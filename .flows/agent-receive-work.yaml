flow: agent-receive-work
version: 1
description: >
  Core agent execution flow. Reads inbox, loads persona and instructions,
  assesses complexity, builds prompt, calls LLM, stores result, logs completion.
trigger: dispatch_go

steps:
  - id: check_budget
    action: budget.check
    params: {}
    output: budget
    # Returns: session_pct, weekly_pct, adaptive_cap, status (ok|blocked)

  - id: read_inbox
    action: db.query
    params:
      query_key: agent_inbox
      bind:
        agent_id: "{{agent_id}}"
    output: inbox
    # Returns: { messages: [...], tasks: [...] }

  - id: load_persona
    action: db.query
    params:
      query_key: agent_persona
      bind:
        agent_id: "{{agent_id}}"
    output: persona

  - id: load_instructions
    action: db.query
    params:
      query_key: agent_instructions
      bind:
        agent_id: "{{agent_id}}"
    output: instructions

  - id: load_recent_activity
    action: db.query
    params:
      query_key: agent_recent_activity
      bind:
        agent_id: "{{agent_id}}"
    output: recent_activity

  - id: assess_complexity
    action: routing.assess
    params:
      tasks: "{{inbox.tasks}}"
      messages: "{{inbox.messages}}"
      persona: "{{persona}}"
    output: assessment
    # Returns: { complexity: low|medium|high, model_tier: fast|standard|heavy,
    #            estimated_tokens: int, reason: string }

  - id: build_prompt
    action: prompt.build
    params:
      persona: "{{persona}}"
      instructions: "{{instructions}}"
      tasks: "{{inbox.tasks}}"
      messages: "{{inbox.messages}}"
      recent_activity: "{{recent_activity}}"
      assessment: "{{assessment}}"
      model_override: "{{model_override}}"
    output: prompt_payload
    # Returns: { system_prompt: string, user_prompt: string, model: string }

  - id: call_model
    action: llm.call
    params:
      model: "{{prompt_payload.model}}"
      prompt: "{{prompt_payload.user_prompt}}"
      agent_id: "{{agent_id}}"
      budget: "{{budget}}"
      cwd_override: "{{cwd_override}}"
    output: llm_result
    audit: full
    # Returns: { text: string, model: string, total_tokens: int,
    #            input_tokens: int, output_tokens: int, duration_ms: int,
    #            cost: float, num_turns: int, stop_reason: string }

  - id: store_result
    action: db.query
    params:
      query_key: log_run
      bind:
        agent_id: "{{agent_id}}"
        task_id: "{{inbox.tasks[0].id}}"
        model: "{{llm_result.model}}"
        total_tokens: "{{llm_result.total_tokens}}"
        duration_ms: "{{llm_result.duration_ms}}"
        cost: "{{llm_result.cost}}"
        num_turns: "{{llm_result.num_turns}}"
    output: run_record

  - id: log_completion
    action: db.query
    params:
      query_key: log_activity
      bind:
        agent_id: "{{agent_id}}"
        action: DONE
        description: "Flow completed: agent-receive-work"
        related_task: "{{inbox.tasks[0].id}}"
        model: "{{llm_result.model}}"
        tokens: "{{llm_result.total_tokens}}"
        duration_ms: "{{llm_result.duration_ms}}"
        cost: "{{llm_result.cost}}"
    output: activity_record
