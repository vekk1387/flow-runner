flow: agent-receive-work-gemini
version: 1
description: >
  Same as agent-receive-work but uses Gemini Flash via direct API.
  Zero CLI overhead — pure HTTP call.
trigger: dispatch_go

steps:
  - id: check_budget
    action: budget.check
    params: {}
    output: budget

  - id: read_inbox
    action: db.query
    params:
      query_key: agent_inbox
      bind:
        agent_id: "{{agent_id}}"
    output: inbox

  - id: load_persona
    action: db.query
    params:
      query_key: agent_persona
      bind:
        agent_id: "{{agent_id}}"
    output: persona

  - id: load_instructions
    action: db.query
    params:
      query_key: agent_instructions
      bind:
        agent_id: "{{agent_id}}"
    output: instructions

  - id: load_recent_activity
    action: db.query
    params:
      query_key: agent_recent_activity
      bind:
        agent_id: "{{agent_id}}"
    output: recent_activity

  - id: assess_complexity
    action: routing.assess
    params:
      tasks: "{{inbox.tasks}}"
      messages: "{{inbox.messages}}"
      persona: "{{persona}}"
    output: assessment

  - id: build_prompt
    action: prompt.build
    params:
      persona: "{{persona}}"
      instructions: "{{instructions}}"
      tasks: "{{inbox.tasks}}"
      messages: "{{inbox.messages}}"
      recent_activity: "{{recent_activity}}"
      assessment: "{{assessment}}"
      model_override: "{{model_override}}"
    output: prompt_payload

  - id: call_model
    action: llm.call_gemini
    params:
      model: gemini-flash
      prompt: "{{prompt_payload.user_prompt}}"
      budget: "{{budget}}"
    output: llm_result
    audit: full

  - id: store_result
    action: db.query
    params:
      query_key: log_run
      bind:
        agent_id: "{{agent_id}}"
        task_id: "{{inbox.tasks[0].id}}"
        model: "{{llm_result.model}}"
        total_tokens: "{{llm_result.total_tokens}}"
        duration_ms: "{{llm_result.duration_ms}}"
        cost: "{{llm_result.cost}}"
        num_turns: 1
    output: run_record

  - id: log_completion
    action: db.query
    params:
      query_key: log_activity
      bind:
        agent_id: "{{agent_id}}"
        action: DONE
        description: "Flow completed: agent-receive-work-gemini"
        related_task: "{{inbox.tasks[0].id}}"
        model: "{{llm_result.model}}"
        tokens: "{{llm_result.total_tokens}}"
        duration_ms: "{{llm_result.duration_ms}}"
        cost: "{{llm_result.cost}}"
    output: activity_record
